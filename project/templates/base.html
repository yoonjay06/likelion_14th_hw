<!DOCTYPE html>
{% load static %}
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="{% static 'css/project.css' %}"
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIKELION 14th Django Session</title>
    <style>
        a {
            text-decoration: none;
        }
        .body-container {
            background-color: #eefac6;
            color: #222222;
            margin: 0;
            font-family: sans-serif;
        }
        .navbar-container {
            display: flex;
            align-items: center;
            padding: 20px 32px;
            gap: 40px;
            background-color: #30ce0d;
        }
        .navbar-link {
            color: #fff;
            font-size: 18px;
        }
        .navbar-link:hover {
            color: #222222;
        }
        .page-container {
            padding: 40px 48px;
        }
        .tag {
            color: #888888;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .title {
            font-size: 48px;
            font-weight: bold;
            margin: 0 0 8px;
        }
        .welcome {
            font-size: 32px;
            margin: 0 0 40px;
        }
        .section-title {
            color: #6cd953;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .section {
            border-left: 3px solid #6cd953;
            padding-left: 16px;
            margin-bottom: 28px;
        }
        .section ul {
            margin: 0;
            padding-left: 20px;
            color: #555555;
        }
        .section li {
            margin-bottom: 6px;
        }
    </style>
</head>

<body class="body-container">
    {% include 'shared/_navbar.html' %}
    {% block content %}

    {% endblock %}
</body>

</html>
